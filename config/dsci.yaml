# DSCInitialization — normally auto-created by the RHOAI operator.
# This template is provided for GitOps-style override if needed.
# On a CRC single-node cluster, Service Mesh may be set to Unmanaged
# if resources are tight.
#
# Source: https://ai-on-openshift.io/odh-rhoai/gitops
# Ref: https://docs.redhat.com/en/documentation/red_hat_openshift_ai_self-managed/
apiVersion: dscinitialization.opendatahub.io/v1
kind: DSCInitialization
metadata:
  name: default-dsci
spec:
  applicationsNamespace: redhat-ods-applications
  serviceMesh:
    controlPlane:
      metricsCollection: Istio
      name: data-science-smcp
      namespace: istio-system
    managementState: Managed
  trustedCABundle:
    customCABundle: ""
    managementState: Managed
